name: Deploy to Azure

# App CD pipeline (least-privilege). The platform/infra layer (registry, Event
# Hubs, Cosmos DB, Key Vault, Container Apps environment - including the RBAC
# role assignments) is provisioned once out-of-band with infra/platform.bicep by
# someone with role-assignment rights. This pipeline runs as a Contributor-scoped
# identity and only does the frequent app-layer work: read the platform's
# outputs, build & push the images, and deploy infra/apps.bicep (the three
# Container Apps). apps.bicep creates no role assignments, so Contributor is
# sufficient here.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: fraud-detection-platform
  PLATFORM_DEPLOYMENT: platform

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # OIDC federated login - no client secret stored in GitHub.
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Pull the outputs (registry, identity, env id, KV uri, kafka bootstrap...)
      # from the already-deployed platform layer so we can wire the apps to them.
      - name: Read platform outputs
        id: platform
        run: |
          OUT=$(az deployment group show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$PLATFORM_DEPLOYMENT" \
            --query properties.outputs -o json)
          echo "acrName=$(echo "$OUT" | jq -r '.acrName.value')" >> "$GITHUB_OUTPUT"
          echo "acrLoginServer=$(echo "$OUT" | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "identityId=$(echo "$OUT" | jq -r '.identityId.value')" >> "$GITHUB_OUTPUT"
          echo "containerAppsEnvironmentId=$(echo "$OUT" | jq -r '.containerAppsEnvironmentId.value')" >> "$GITHUB_OUTPUT"
          echo "envStorageName=$(echo "$OUT" | jq -r '.envStorageName.value')" >> "$GITHUB_OUTPUT"
          echo "keyVaultUri=$(echo "$OUT" | jq -r '.keyVaultUri.value')" >> "$GITHUB_OUTPUT"
          echo "kafkaBootstrapServers=$(echo "$OUT" | jq -r '.kafkaBootstrapServers.value')" >> "$GITHUB_OUTPUT"
          echo "eventHubName=$(echo "$OUT" | jq -r '.eventHubName.value')" >> "$GITHUB_OUTPUT"
          echo "cosmosDatabaseName=$(echo "$OUT" | jq -r '.cosmosDatabaseName.value')" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        run: az acr login --name ${{ steps.platform.outputs.acrName }}

      - name: Build and push images
        run: |
          ACR="${{ steps.platform.outputs.acrLoginServer }}"
          TAG="${{ github.sha }}"
          docker build -f docker/Dockerfile.api -t "$ACR/fraud-api:$TAG" -t "$ACR/fraud-api:latest" .
          docker build -f docker/Dockerfile.spark -t "$ACR/fraud-spark:$TAG" -t "$ACR/fraud-spark:latest" .
          docker build -f docker/Dockerfile.producer -t "$ACR/fraud-producer:$TAG" -t "$ACR/fraud-producer:latest" .
          docker push "$ACR/fraud-api:$TAG"
          docker push "$ACR/fraud-api:latest"
          docker push "$ACR/fraud-spark:$TAG"
          docker push "$ACR/fraud-spark:latest"
          docker push "$ACR/fraud-producer:$TAG"
          docker push "$ACR/fraud-producer:latest"

      - name: Deploy apps layer
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/apps.bicep
          deploymentName: apps-${{ github.run_number }}
          parameters: >
            imageTag=${{ github.sha }}
            acrLoginServer=${{ steps.platform.outputs.acrLoginServer }}
            containerAppsEnvironmentId=${{ steps.platform.outputs.containerAppsEnvironmentId }}
            identityId=${{ steps.platform.outputs.identityId }}
            envStorageName=${{ steps.platform.outputs.envStorageName }}
            keyVaultUri=${{ steps.platform.outputs.keyVaultUri }}
            kafkaBootstrapServers=${{ steps.platform.outputs.kafkaBootstrapServers }}
            eventHubName=${{ steps.platform.outputs.eventHubName }}
            cosmosDatabaseName=${{ steps.platform.outputs.cosmosDatabaseName }}
