name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps (librdkafka for confluent-kafka)
        run: sudo apt-get update && sudo apt-get install -y librdkafka-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app producer spark tests

      - name: Compile check
        run: python -m compileall app producer spark

      - name: Run tests
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # build the images to catch Dockerfile regressions; no push
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: fraud-api:ci

      - name: Build producer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.producer
          push: false
          tags: fraud-producer:ci

      - name: Validate compose file
        run: docker compose config -q
